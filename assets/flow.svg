<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F8FC"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="1400" height="520" fill="#F7FAFC"/>
  <text x="70" y="88" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">What users should expect</text>
  <text x="70" y="124" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="22">Long answers no longer pop a modal. They leave a lightweight hint, and exports happen on demand.</text>

  <g>
    <rect x="70" y="180" width="270" height="220" rx="24" fill="url(#card)" stroke="#D8DEEA"/>
    <text x="98" y="226" fill="#1C7C72" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">STEP 1</text>
    <text x="98" y="268" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Long answer finishes</text>
    <text x="98" y="316" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">The assistant message stays visible.</text>
    <text x="98" y="350" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">The extension only captures it in session state.</text>
  </g>

  <g>
    <rect x="420" y="180" width="270" height="220" rx="24" fill="url(#card)" stroke="#D8DEEA"/>
    <text x="448" y="226" fill="#1C7C72" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">STEP 2</text>
    <text x="448" y="268" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Notice appears</text>
    <text x="448" y="316" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">“Long answer captured for HTML export...”</text>
    <text x="448" y="350" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">No blocking prompt. No disappearing message.</text>
  </g>

  <g>
    <rect x="770" y="180" width="270" height="220" rx="24" fill="url(#card)" stroke="#D8DEEA"/>
    <text x="798" y="226" fill="#1C7C72" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">STEP 3</text>
    <text x="798" y="268" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Run /html-last</text>
    <text x="798" y="316" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Pick Gemini, current Pi model,</text>
    <text x="798" y="350" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">or the quick local renderer.</text>
  </g>

  <g>
    <rect x="1120" y="180" width="210" height="220" rx="24" fill="#0F172A"/>
    <text x="1148" y="226" fill="#6EE7B7" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">STEP 4</text>
    <text x="1148" y="268" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Open HTML</text>
    <text x="1148" y="316" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">The export is written to disk</text>
    <text x="1148" y="350" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">and opened in the browser.</text>
  </g>

  <path d="M340 290H406" stroke="#6B7280" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M690 290H756" stroke="#6B7280" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1040 290H1106" stroke="#6B7280" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
